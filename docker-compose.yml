version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: epi_postgres
    environment:
      POSTGRES_DB: epi_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epi_backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=epi_management;Username=postgres;Password=postgres
      - Jwt__Key=EpiManagement_SuperSecretKey_2024_MinLength32Chars!!
      - Jwt__Issuer=EpiManagement
      - Jwt__Audience=EpiManagementUsers
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: epi_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
